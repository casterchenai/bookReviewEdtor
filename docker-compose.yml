# 团队/生产环境使用的 Postgres（本地开发也可以用 `npm run dev:db` 启动内嵌数据库）
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookreview
    ports:
      - "5502:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
